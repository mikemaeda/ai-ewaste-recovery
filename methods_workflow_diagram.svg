<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="620" viewBox="0 0 2400 620" role="img" aria-labelledby="title desc">
  <title id="title">Methods Workflow: Vision to Recovery Support</title>
  <desc id="desc">Horizontal workflow diagram showing camera capture, preprocessing, MobileNetV2 classification, component prediction, material database lookup, and recovery output.</desc>

  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 54px; font-weight: 700; fill: #17203a; }
      .step-title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #17203a; }
      .step-sub { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 500; fill: #4d5b73; }
      .caption { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 600; fill: #526079; }
      .box { fill: #ffffff; stroke: #c7d5f4; stroke-width: 4; rx: 28; }
      .box-accent { fill: #f7f9ff; stroke: #7a5cff; stroke-width: 5; rx: 28; }
      .icon-blue { stroke: #1976d2; fill: none; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .icon-purple { stroke: #7a5cff; fill: none; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill-blue { fill: #e9f3ff; stroke: #1976d2; stroke-width: 10; }
      .icon-fill-purple { fill: #f1edff; stroke: #7a5cff; stroke-width: 10; }
      .arrow { stroke: #6d7fa8; stroke-width: 8; stroke-linecap: round; fill: none; marker-end: url(#arrowhead); }
    </style>

    <marker id="arrowhead" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#6d7fa8"/>
    </marker>

    <linearGradient id="headerGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
  </defs>

  <rect width="2400" height="620" fill="#ffffff"/>
  <rect x="0" y="0" width="2400" height="14" fill="url(#headerGrad)"/>

  <text x="1200" y="82" text-anchor="middle" class="title">Methods Workflow: Vision to Recovery Support</text>
  <text x="1200" y="122" text-anchor="middle" class="caption">Camera image → AI classification → material lookup → recovery recommendation</text>

  <!-- Step boxes -->
  <g transform="translate(70 178)">
    <rect class="box" width="300" height="300"/>
    <!-- Camera icon -->
    <rect x="78" y="82" width="144" height="98" rx="18" class="icon-fill-blue"/>
    <path d="M112 82 L130 54 H170 L188 82" class="icon-blue"/>
    <circle cx="150" cy="132" r="34" class="icon-blue"/>
    <circle cx="210" cy="104" r="7" fill="#1976d2"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Capture</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">Camera Image</text>
  </g>

  <path d="M390 328 H480" class="arrow"/>

  <g transform="translate(500 178)">
    <rect class="box" width="300" height="300"/>
    <!-- Image/preprocess icon -->
    <rect x="82" y="60" width="136" height="120" rx="12" class="icon-fill-purple"/>
    <path d="M104 148 L134 116 L158 142 L178 122 L206 154" class="icon-purple"/>
    <circle cx="126" cy="92" r="10" fill="#7a5cff"/>
    <path d="M92 210 H208 M108 235 H192" class="icon-blue"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Preprocess</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">Resize + Normalize</text>
  </g>

  <path d="M820 328 H910" class="arrow"/>

  <g transform="translate(930 178)">
    <rect class="box-accent" width="300" height="300"/>
    <!-- Neural network icon -->
    <circle cx="95" cy="88" r="16" class="icon-fill-blue"/>
    <circle cx="95" cy="150" r="16" class="icon-fill-blue"/>
    <circle cx="95" cy="212" r="16" class="icon-fill-blue"/>
    <circle cx="150" cy="120" r="16" class="icon-fill-purple"/>
    <circle cx="150" cy="182" r="16" class="icon-fill-purple"/>
    <circle cx="205" cy="150" r="16" class="icon-fill-blue"/>
    <path d="M111 88 L134 120 M111 88 L134 182 M111 150 L134 120 M111 150 L134 182 M111 212 L134 120 M111 212 L134 182 M166 120 L189 150 M166 182 L189 150" class="icon-purple" stroke-width="7"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Analyze</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">MobileNetV2</text>
  </g>

  <path d="M1250 328 H1340" class="arrow"/>

  <g transform="translate(1360 178)">
    <rect class="box" width="300" height="300"/>
    <!-- Prediction tag icon -->
    <path d="M88 76 H190 L222 108 V176 H88 Z" class="icon-fill-blue"/>
    <path d="M190 76 V108 H222" class="icon-blue"/>
    <path d="M110 118 H198 M110 150 H174" class="icon-purple"/>
    <circle cx="207" cy="91" r="6" fill="#7a5cff"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Predict</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">Component Type</text>
  </g>

  <path d="M1680 328 H1770" class="arrow"/>

  <g transform="translate(1790 178)">
    <rect class="box" width="300" height="300"/>
    <!-- Database icon -->
    <ellipse cx="150" cy="82" rx="74" ry="26" class="icon-fill-purple"/>
    <path d="M76 82 V174 C76 189 109 202 150 202 C191 202 224 189 224 174 V82" class="icon-purple"/>
    <path d="M76 128 C76 143 109 156 150 156 C191 156 224 143 224 128" class="icon-purple"/>
    <path d="M108 228 H192" class="icon-blue"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Match</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">Material Database</text>
  </g>

  <path d="M2110 328 H2200" class="arrow"/>

  <g transform="translate(2025 498)">
    <text x="0" y="0" class="step-sub" fill="#7a5cff">Name • Materials • Value • Priority</text>
  </g>

  <g transform="translate(2220 178)">
    <rect class="box-accent" width="300" height="300"/>
    <!-- Recycling / output icon -->
    <path d="M150 64 L180 116 H158" class="icon-blue"/>
    <path d="M180 116 L128 116 L140 94" class="icon-blue"/>
    <path d="M214 142 L184 194 L174 174" class="icon-purple"/>
    <path d="M184 194 L210 148 L232 158" class="icon-purple"/>
    <path d="M92 142 L122 194 L134 174" class="icon-blue"/>
    <path d="M122 194 L96 148 L74 158" class="icon-blue"/>
    <text x="150" y="230" text-anchor="middle" class="step-title">Output</text>
    <text x="150" y="263" text-anchor="middle" class="step-sub">Recovery Support</text>
  </g>
</svg>
